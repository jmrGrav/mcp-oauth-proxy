# MCP OAuth Proxy — nginx vhost
# Replace mcp.your-domain.com with your actual domain.
# Requires a valid SSL certificate (Let's Encrypt recommended).
#
# This vhost proxies all traffic to the FastAPI proxy (port 8083).
# The proxy handles: /mcp, /.well-known/oauth-*, /authorize, /token

server {
    listen 443 ssl http2;
    server_name mcp.your-domain.com;

    # SSL — adapt paths to your certificate
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Optional: restrict access to known MCP client IP ranges
    # Uncomment and adapt to your needs:
    # allow 34.0.0.0/8;     # Example: Anthropic outbound IPs
    # allow 192.168.1.0/24; # Example: your home network
    # deny all;

    client_max_body_size 2m;

    # Block direct access to the Grav MCP plugin endpoint
    location ^~ /api/mcp {
        return 444;
    }

    # Proxy all requests to the FastAPI OAuth proxy
    location / {
        proxy_pass         http://127.0.0.1:8083/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE support (Server-Sent Events for MCP streaming)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name mcp.your-domain.com;
    return 301 https://$host$request_uri;
}
